name: Test

on:
  push:
    branches: [main, develop, feat/*, fix/*]
  pull_request:
    branches: [main, develop]

jobs:
  test-backend:
    name: Backend Tests (JUnit 5 + Mockito)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: wms_test
          POSTGRES_USER: wms
          POSTGRES_PASSWORD: wms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run backend tests
        run: |
          cd backend
          set +e
          mvn -B -e test --no-transfer-progress
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "::group::Surefire error reports"
            grep -lE 'errors="[1-9][0-9]*"' target/surefire-reports/TEST-*.xml 2>/dev/null \
              | while IFS= read -r report; do
                  echo "===== $report ====="
                  cat "$report"
                done
            find target/surefire-reports -maxdepth 1 -type f \
              \( -name '*.dump' -o -name '*.dumpstream' \) -print -exec cat {} \;
            echo "::endgroup::"
          fi
          exit "$status"
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/wms_test
          SPRING_DATASOURCE_USERNAME: wms
          SPRING_DATASOURCE_PASSWORD: wms_test

      - name: Upload backend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-surefire-reports
          path: backend/target/surefire-reports/
          if-no-files-found: ignore

  test-frontend:
    name: Frontend Tests (Jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run frontend tests
        run: cd frontend && npm test --if-present
