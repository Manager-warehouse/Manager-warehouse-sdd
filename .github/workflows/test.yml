name: Test

on:
  push:
    branches: [main, develop, feat/*, fix/*]
  pull_request:
    branches: [main, develop]

jobs:
  test-backend:
    name: Backend Tests (JUnit 5 + Mockito)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: wms_test
          POSTGRES_USER: wms
          POSTGRES_PASSWORD: wms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run backend tests and coverage
        run: |
          cd backend
          set +e
          mvn --settings ../.github/maven-settings.xml -B -e clean verify --no-transfer-progress
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "::group::Surefire & Failsafe error reports"
            grep -lE 'errors="[1-9][0-9]*"' target/surefire-reports/TEST-*.xml target/failsafe-reports/TEST-*.xml 2>/dev/null \
              | while IFS= read -r report; do
                  echo "===== $report ====="
                  cat "$report"
                done
            find target/surefire-reports target/failsafe-reports -maxdepth 1 -type f \
              \( -name '*.dump' -o -name '*.dumpstream' \) -print -exec cat {} \; 2>/dev/null
            echo "::endgroup::"
          fi
          exit "$status"
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/wms_test
          SPRING_DATASOURCE_USERNAME: wms
          SPRING_DATASOURCE_PASSWORD: wms_test

      - name: Upload backend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            backend/target/surefire-reports/
            backend/target/failsafe-reports/
          if-no-files-found: ignore

      - name: Analyze with SonarQube
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          if [ -n "$SONAR_TOKEN" ]; then
            cd backend && mvn --settings ../.github/maven-settings.xml sonar:sonar -Dsonar.projectKey=wms-backend -Dsonar.host.url=$SONAR_HOST_URL -Dsonar.login=$SONAR_TOKEN --no-transfer-progress
          else
            echo "SonarQube credentials not set, skipping analysis."
          fi

  test-frontend:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest
    env:
      HAS_SONAR_TOKEN: ${{ secrets.SONAR_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run lint
        run: cd frontend && npm run lint

      - name: Run frontend tests and coverage
        run: cd frontend && npm run test:coverage

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Analyze with SonarQube (Frontend)
        if: ${{ env.HAS_SONAR_TOKEN == 'true' }}
        uses: sonarsource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: frontend
          args: >
            -Dsonar.projectKey=wms-frontend
            -Dsonar.sources=src
            -Dsonar.tests=tests
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.coverage.exclusions=src/main.jsx,src/App.jsx,src/router.jsx

