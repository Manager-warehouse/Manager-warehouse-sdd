openapi: 3.0.3
info:
  title: WMS Accountant Partner APIs
  version: 0.1.0
servers:
  - url: /api/v1
paths:
  /dealers:
    get:
      summary: List dealers
      tags: [Dealers]
      responses:
        "200":
          description: Dealer page
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DealerResponse"
    post:
      summary: Create dealer profile
      tags: [Dealers]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DealerCreateRequest"
      responses:
        "201":
          description: Dealer created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DealerResponse"
        "400":
          description: Validation error
        "403":
          description: ACCOUNTANT role required
        "409":
          description: Duplicate dealer code
  /dealers/{id}:
    get:
      summary: Get dealer detail
      tags: [Dealers]
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Dealer detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DealerResponse"
        "404":
          description: Dealer not found
    put:
      summary: Update dealer profile
      tags: [Dealers]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DealerUpdateRequest"
      responses:
        "200":
          description: Dealer updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DealerResponse"
        "400":
          description: Validation error
        "403":
          description: ACCOUNTANT role required
        "404":
          description: Dealer not found
    delete:
      summary: Soft-delete dealer
      tags: [Dealers]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "204":
          description: Dealer deactivated
        "403":
          description: ACCOUNTANT role required
        "404":
          description: Dealer not found
  /dealers/{id}/reactivate:
    put:
      summary: Reactivate dealer
      tags: [Dealers]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Dealer reactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DealerResponse"
        "403":
          description: ACCOUNTANT role required
        "404":
          description: Dealer not found
  /dealers/{id}/credit-limit:
    put:
      summary: Update dealer credit limit
      tags: [Dealers]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DealerCreditLimitUpdateRequest"
      responses:
        "200":
          description: Credit limit updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DealerResponse"
        "400":
          description: Credit limit must be positive and greater than current balance
        "403":
          description: ACCOUNTANT_MANAGER role required
        "404":
          description: Dealer not found
  /dealers/{id}/payment-term:
    put:
      summary: Update dealer payment term
      tags: [Dealers]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DealerPaymentTermUpdateRequest"
      responses:
        "200":
          description: Payment term updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DealerResponse"
        "400":
          description: Payment term must be 30 or 60
        "403":
          description: ACCOUNTANT_MANAGER role required
        "404":
          description: Dealer not found
  /dealers/{id}/credit-status:
    put:
      summary: Update dealer credit status
      tags: [Dealers]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DealerCreditStatusUpdateRequest"
      responses:
        "200":
          description: Credit status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DealerResponse"
        "400":
          description: Invalid credit status
        "403":
          description: ACCOUNTANT_MANAGER role required
        "404":
          description: Dealer not found
  /suppliers:
    get:
      summary: List suppliers
      tags: [Suppliers]
      responses:
        "200":
          description: Supplier page
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupplierResponse"
    post:
      summary: Create supplier
      tags: [Suppliers]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupplierCreateRequest"
      responses:
        "201":
          description: Supplier created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierResponse"
        "400":
          description: Validation error
        "403":
          description: ACCOUNTANT role required
        "409":
          description: Duplicate supplier code
  /suppliers/{id}:
    get:
      summary: Get supplier detail
      tags: [Suppliers]
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Supplier detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierResponse"
        "404":
          description: Supplier not found
    put:
      summary: Update supplier profile
      tags: [Suppliers]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupplierUpdateRequest"
      responses:
        "200":
          description: Supplier updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierResponse"
        "400":
          description: Validation error
        "403":
          description: ACCOUNTANT role required
        "404":
          description: Supplier not found
    delete:
      summary: Soft-delete supplier
      tags: [Suppliers]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "204":
          description: Supplier deactivated
        "403":
          description: ACCOUNTANT role required
        "404":
          description: Supplier not found
  /suppliers/{id}/reactivate:
    put:
      summary: Reactivate supplier
      tags: [Suppliers]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Supplier reactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierResponse"
        "403":
          description: ACCOUNTANT role required
        "404":
          description: Supplier not found
  /suppliers/{id}/received-orders:
    get:
      summary: List received orders for supplier
      tags: [Suppliers]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Supplier received orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupplierReceivedOrderResponse"
        "404":
          description: Supplier not found
  /suppliers/{id}/received-orders/{orderId}:
    get:
      summary: Get supplier received order detail
      tags: [Suppliers]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Supplier received order detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierReceivedOrderDetailResponse"
        "404":
          description: Supplier or received order not found
  /delivery-orders:
    get:
      summary: List delivery orders
      tags: [DeliveryOrders]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Delivery order list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeliveryOrderResponse"
    post:
      summary: Create delivery order
      tags: [DeliveryOrders]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeliveryOrderCreateRequest"
      responses:
        "201":
          description: Delivery order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryOrderResponse"
        "400":
          description: Validation error
        "409":
          description: Dealer is inactive or business rule failed
  /delivery-orders/{id}:
    get:
      summary: Get delivery order detail
      tags: [DeliveryOrders]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Delivery order detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryOrderResponse"
        "404":
          description: Delivery order not found
    put:
      summary: Update delivery order
      tags: [DeliveryOrders]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeliveryOrderUpdateRequest"
      responses:
        "200":
          description: Delivery order updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryOrderResponse"
        "400":
          description: Validation error
        "404":
          description: Delivery order not found
    delete:
      summary: Cancel delivery order
      tags: [DeliveryOrders]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "204":
          description: Delivery order cancelled
        "404":
          description: Delivery order not found
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
  schemas:
    DealerCreateRequest:
      type: object
      required: [code, name]
      properties:
        code:
          type: string
          maxLength: 50
        name:
          type: string
          maxLength: 255
        phone:
          type: string
          maxLength: 20
        defaultDeliveryAddress:
          type: string
        region:
          type: string
          maxLength: 100
      additionalProperties: false
    DealerUpdateRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        phone:
          type: string
          maxLength: 20
        defaultDeliveryAddress:
          type: string
        region:
          type: string
          maxLength: 100
      additionalProperties: false
    DealerCreditLimitUpdateRequest:
      type: object
      required: [creditLimit]
      properties:
        creditLimit:
          type: number
          minimum: 0
          exclusiveMinimum: true
      additionalProperties: false
    DealerPaymentTermUpdateRequest:
      type: object
      required: [paymentTermDays]
      properties:
        paymentTermDays:
          type: integer
          enum: [30, 60]
      additionalProperties: false
    DealerCreditStatusUpdateRequest:
      type: object
      required: [creditStatus]
      properties:
        creditStatus:
          type: string
          enum: [ACTIVE, CREDIT_HOLD]
      additionalProperties: false
    DealerResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        code:
          type: string
        name:
          type: string
        phone:
          type: string
        defaultDeliveryAddress:
          type: string
        region:
          type: string
        paymentTermDays:
          type: integer
          enum: [30, 60]
        creditLimit:
          type: number
        currentBalance:
          type: number
        creditStatus:
          type: string
          enum: [ACTIVE, CREDIT_HOLD]
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    SupplierCreateRequest:
      type: object
      required: [code, companyName]
      properties:
        code:
          type: string
          maxLength: 50
        companyName:
          type: string
          maxLength: 255
        taxCode:
          type: string
          maxLength: 20
        phone:
          type: string
          maxLength: 20
        contactPerson:
          type: string
          maxLength: 255
        address:
          type: string
      additionalProperties: false
    SupplierUpdateRequest:
      type: object
      properties:
        companyName:
          type: string
          maxLength: 255
        taxCode:
          type: string
          maxLength: 20
        phone:
          type: string
          maxLength: 20
        contactPerson:
          type: string
          maxLength: 255
        address:
          type: string
      additionalProperties: false
    SupplierResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        code:
          type: string
        companyName:
          type: string
        taxCode:
          type: string
        phone:
          type: string
        contactPerson:
          type: string
        address:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    DeliveryOrderItemCreateRequest:
      type: object
      required: [productId, requestedQty]
      properties:
        productId:
          type: integer
          format: int64
        batchId:
          type: integer
          format: int64
        locationId:
          type: integer
          format: int64
        requestedQty:
          type: number
          exclusiveMinimum: true
          minimum: 0
        unitPrice:
          type: number
      additionalProperties: false
    DeliveryOrderCreateRequest:
      type: object
      required: [dealerId, warehouseId, type, documentDate, items]
      properties:
        dealerId:
          type: integer
          format: int64
        warehouseId:
          type: integer
          format: int64
        type:
          type: string
          enum: [SALE, DELIVERY, ADJUSTMENT]
        expectedDeliveryDate:
          type: string
          format: date
        documentDate:
          type: string
          format: date
        notes:
          type: string
        items:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/DeliveryOrderItemCreateRequest"
      additionalProperties: false
    DeliveryOrderUpdateRequest:
      type: object
      properties:
        expectedDeliveryDate:
          type: string
          format: date
        notes:
          type: string
        cancelReason:
          type: string
      additionalProperties: false
    DeliveryOrderItemResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        productId:
          type: integer
          format: int64
        batchId:
          type: integer
          format: int64
        locationId:
          type: integer
          format: int64
        requestedQty:
          type: number
        reservedQty:
          type: number
        issuedQty:
          type: number
        unitPrice:
          type: number
    DeliveryOrderResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        doNumber:
          type: string
        dealerId:
          type: integer
          format: int64
        warehouseId:
          type: integer
          format: int64
        type:
          type: string
          enum: [SALE, DELIVERY, ADJUSTMENT]
        expectedDeliveryDate:
          type: string
          format: date
        status:
          type: string
          enum:
            [
              NEW,
              WAITING_PICKING,
              PICKING,
              QC_PENDING_APPROVAL,
              QC_COMPLETED,
              WAREHOUSE_APPROVED,
              IN_TRANSIT,
              RETURNED,
              DELIVERY_FAILED,
              COMPLETED,
              CLOSED,
              CANCELLED,
            ]
        documentDate:
          type: string
          format: date
        notes:
          type: string
        cancelReason:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/DeliveryOrderItemResponse"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    SupplierReceivedOrderResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        documentNumber:
          type: string
        documentDate:
          type: string
          format: date
        status:
          type: string
        sourceType:
          type: string
    SupplierReceivedOrderDetailResponse:
      allOf:
        - $ref: "#/components/schemas/SupplierReceivedOrderResponse"
        - type: object
          properties:
            items:
              type: array
              items:
                type: object
