openapi: 3.0.3
info:
  title: Driver Mobile POD API
  version: 1.0.0
  description: Contracts for driver mobile POD upload, OTP confirmation, failed delivery, trip completion, returned-goods warehouse processing, and admin OTP reset in Sprint 1.
paths:
  /api/v1/trips/driver:
    get:
      summary: List assigned trips for driver mobile
      operationId: listDriverTrips
      tags:
        - Driver Trips
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Assigned driver trips across DELIVERY and TRANSFER trip types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TripDriverViewResponse"
        "403":
          description: Authenticated user is not a Driver
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/trips/{id}:
    get:
      summary: Get assigned trip detail for driver mobile
      operationId: getDriverTrip
      tags:
        - Driver Trips
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Assigned trip detail with Delivery Orders and current attempt data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripDriverViewResponse"
        "403":
          description: Driver is not assigned to the trip
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Trip not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/trips/{tripId}/delivery-orders/{doId}/pod-evidence:
    post:
      summary: Upload POD evidence for a Delivery Order in the assigned trip
      operationId: uploadPodEvidence
      tags:
        - Driver Trips
      security:
        - bearerAuth: []
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: doId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - goodsImage
                - signDocumentImage
              properties:
                goodsImage:
                  type: string
                  format: binary
                signDocumentImage:
                  type: string
                  format: binary
                notes:
                  type: string
                  maxLength: 1000
      responses:
        "200":
          description: POD evidence stored on the current delivery attempt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryAttemptResponse"
        "400":
          description: Missing or invalid POD file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Driver is not assigned to the trip
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Current delivery attempt not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Delivery attempt is no longer current or already finalized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/trips/{tripId}/delivery-orders/{doId}/delivery-otp:
    post:
      summary: Generate or resend OTP for the current delivery attempt
      operationId: requestDeliveryOtp
      tags:
        - Driver Trips
      security:
        - bearerAuth: []
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: doId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeliveryOtpRequest"
      responses:
        "200":
          description: OTP generated or resent for the current delivery attempt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryOtpResponse"
        "400":
          description: POD evidence missing or payload invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Driver is not assigned to the trip
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Delivery attempt not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: OTP is still active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Dealer email missing or OTP is locked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/trips/{tripId}/delivery-orders/{doId}/confirm-delivery:
    put:
      summary: Confirm full Delivery Order delivery with dealer OTP
      operationId: confirmDelivery
      tags:
        - Driver Trips
      security:
        - bearerAuth: []
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: doId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmDeliveryRequest"
      responses:
        "200":
          description: Delivery confirmed and Delivery Order completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryAttemptResponse"
        "400":
          description: Invalid OTP, expired OTP, missing POD, or malformed payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Driver is not assigned to the trip
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Delivery attempt not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Delivery already finalized or concurrent inventory/financial conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Partial delivery attempted or In-Transit stock missing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "423":
          description: OTP locked and requires admin reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/trips/{tripId}/delivery-orders/{doId}/fail-delivery:
    put:
      summary: Record dealer refusal or delivery failure
      operationId: failDelivery
      tags:
        - Driver Trips
      security:
        - bearerAuth: []
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: doId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FailDeliveryRequest"
      responses:
        "200":
          description: Delivery attempt failed and Delivery Order moved to RETURNED
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryAttemptResponse"
        "400":
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Driver is not assigned to the trip
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Delivery attempt not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Delivery already finalized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/trips/{tripId}/complete:
    put:
      summary: Confirm vehicle return and complete the assigned trip
      operationId: completeDriverTrip
      tags:
        - Driver Trips
      security:
        - bearerAuth: []
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripCompleteRequest"
      responses:
        "200":
          description: Trip completed and driver/vehicle released
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripDriverViewResponse"
        "400":
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Driver is not assigned to the trip
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Trip not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Trip is not ready to complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/admin/delivery-orders/{doId}/delivery-otp/reset:
    post:
      summary: Reset a locked OTP for the current delivery attempt
      operationId: resetDeliveryOtp
      tags:
        - Admin Delivery
      security:
        - bearerAuth: []
      parameters:
        - name: doId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetDeliveryOtpRequest"
      responses:
        "200":
          description: Locked OTP reset for the current delivery attempt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryOtpResponse"
        "400":
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Current delivery attempt or OTP row not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "423":
          description: OTP reset requested for a row that is not in a resettable locked state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/delivery-orders/{doId}/returned-goods:
    get:
      summary: Get returned-goods flow state
      operationId: getReturnedGoodsFlow
      tags:
        - Returned Delivery Goods
      security:
        - bearerAuth: []
      parameters:
        - name: doId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Current returned-goods flow state for the Delivery Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReturnedGoodsFlowResponse"
        "422":
          description: Returned-goods flow has not been submitted yet or Delivery Order state is invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/delivery-orders/{doId}/returned-goods/count-qc:
    put:
      summary: Submit returned-goods count and quality inspection
      operationId: submitReturnedGoodsCountQc
      tags:
        - Returned Delivery Goods
      security:
        - bearerAuth: []
      parameters:
        - name: doId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReturnedGoodsCountQcRequest"
      responses:
        "200":
          description: Returned goods count/QC submitted while Delivery Order remains RETURNED
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReturnedGoodsFlowResponse"
        "422":
          description: Delivery Order state, quantity, or quality result validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/delivery-orders/{doId}/returned-goods/approval:
    put:
      summary: Storekeeper approves returned-goods count and quality
      operationId: approveReturnedGoods
      tags:
        - Returned Delivery Goods
      security:
        - bearerAuth: []
      parameters:
        - name: doId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReturnedGoodsApprovalRequest"
      responses:
        "200":
          description: Returned goods quantity and quality approved while Delivery Order remains RETURNED
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReturnedGoodsFlowResponse"
        "422":
          description: Count/QC result is incomplete or cannot be approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/delivery-orders/{doId}/returned-goods/putaway-plan:
    put:
      summary: Storekeeper creates returned-goods putaway plan
      operationId: planReturnedGoodsPutaway
      tags:
        - Returned Delivery Goods
      security:
        - bearerAuth: []
      parameters:
        - name: doId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReturnedGoodsPutawayPlanRequest"
      responses:
        "200":
          description: Returned goods putaway plan created while Delivery Order remains RETURNED
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReturnedGoodsFlowResponse"
        "422":
          description: Storekeeper approval or destination-location validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/delivery-orders/{doId}/returned-goods/putaway-complete:
    put:
      summary: Warehouse staff confirms returned-goods putaway completion
      operationId: completeReturnedGoodsPutaway
      tags:
        - Returned Delivery Goods
      security:
        - bearerAuth: []
      parameters:
        - name: doId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReturnedGoodsPutawayCompleteRequest"
      responses:
        "200":
          description: Returned goods put away; inventory moved from IN_TRANSIT and Delivery Order moved to DELIVERY_FAILED
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReturnedGoodsFlowResponse"
        "422":
          description: Putaway plan is missing or completion does not match the plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    DeliveryOtpRequest:
      type: object
      properties:
        resend:
          type: boolean
          default: false
    ConfirmDeliveryRequest:
      type: object
      required:
        - otp
      properties:
        otp:
          type: string
          pattern: "^[0-9]{6}$"
        notes:
          type: string
          maxLength: 1000
    FailDeliveryRequest:
      type: object
      required:
        - failureReason
      properties:
        failureReason:
          type: string
          minLength: 1
          maxLength: 1000
        notes:
          type: string
          maxLength: 1000
    ResetDeliveryOtpRequest:
      type: object
      required:
        - resetReason
      properties:
        resetReason:
          type: string
          minLength: 1
          maxLength: 1000
        notes:
          type: string
          maxLength: 1000
    TripCompleteRequest:
      type: object
      properties:
        returnedAt:
          type: string
          format: date-time
        notes:
          type: string
          maxLength: 1000
    ReturnedGoodsCountQcRequest:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ReturnedGoodsCountQcItem"
        notes:
          type: string
          maxLength: 1000
    ReturnedGoodsCountQcItem:
      type: object
      required:
        - doItemId
        - productId
        - batchId
        - countedQty
        - qualityResult
      properties:
        doItemId:
          type: integer
          format: int64
        productId:
          type: integer
          format: int64
        batchId:
          type: integer
          format: int64
        countedQty:
          type: number
          minimum: 0
        qualityResult:
          type: string
          enum:
            - PASSED
            - FAILED
        qualityReason:
          type: string
          maxLength: 1000
    ReturnedGoodsApprovalRequest:
      type: object
      properties:
        notes:
          type: string
          maxLength: 1000
    ReturnedGoodsPutawayPlanRequest:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ReturnedGoodsPutawayPlanItem"
        notes:
          type: string
          maxLength: 1000
    ReturnedGoodsPutawayPlanItem:
      type: object
      required:
        - doItemId
        - batchId
        - destinationLocationId
        - plannedQty
      properties:
        doItemId:
          type: integer
          format: int64
        batchId:
          type: integer
          format: int64
        destinationLocationId:
          type: integer
          format: int64
        plannedQty:
          type: number
          minimum: 0
    ReturnedGoodsPutawayCompleteRequest:
      type: object
      properties:
        notes:
          type: string
          maxLength: 1000
    ReturnedGoodsFlowResponse:
      type: object
      properties:
        doId:
          type: integer
          format: int64
        doNumber:
          type: string
        deliveryOrderStatus:
          type: string
          example: RETURNED
        flowStatus:
          type: string
          example: PUTAWAY_PLANNED
        items:
          type: array
          items:
            $ref: "#/components/schemas/ReturnedGoodsFlowItemResponse"
    ReturnedGoodsFlowItemResponse:
      type: object
      properties:
        doItemId:
          type: integer
          format: int64
        productId:
          type: integer
          format: int64
        batchId:
          type: integer
          format: int64
        countedQty:
          type: number
        qualityResult:
          type: string
        destinationLocationId:
          type: integer
          format: int64
        putawayCompletedQty:
          type: number
    TripDriverViewResponse:
      type: object
      properties:
        tripId:
          type: integer
          format: int64
        tripNumber:
          type: string
        status:
          type: string
          example: IN_TRANSIT
        tripType:
          type: string
          enum:
            - DELIVERY
            - TRANSFER
          example: DELIVERY
        tripTypeLabel:
          type: string
          example: Giao dai ly
        transferId:
          type: integer
          format: int64
          nullable: true
          description: Present for TRANSFER rows so the driver app can open the internal transfer detail.
        driverId:
          type: integer
          format: int64
        driverName:
          type: string
        vehicleId:
          type: integer
          format: int64
        vehiclePlate:
          type: string
        plannedStartAt:
          type: string
          format: date-time
        plannedEndAt:
          type: string
          format: date-time
        totalWeightKg:
          type: number
        totalVolumeM3:
          type: number
        deliveryStopCount:
          type: integer
          description: Present for DELIVERY card summaries.
        sourceWarehouseCode:
          type: string
          description: Present for TRANSFER card summaries.
        destinationWarehouseCode:
          type: string
          description: Present for TRANSFER card summaries.
        transferLineCount:
          type: integer
          description: Present for TRANSFER card summaries.
        deliveryOrders:
          type: array
          items:
            $ref: "#/components/schemas/DriverDeliveryOrderResponse"
    DriverDeliveryOrderResponse:
      type: object
      properties:
        doId:
          type: integer
          format: int64
        doNumber:
          type: string
        dealerName:
          type: string
        dealerAddress:
          type: string
        status:
          type: string
          example: IN_TRANSIT
        stopOrder:
          type: integer
        currentAttempt:
          $ref: "#/components/schemas/DeliveryAttemptResponse"
    DeliveryAttemptResponse:
      type: object
      properties:
        deliveryId:
          type: integer
          format: int64
        attemptNumber:
          type: integer
        status:
          type: string
          example: IN_TRANSIT
        podImageUrl:
          type: string
        podSignatureUrl:
          type: string
        podTimestamp:
          type: string
          format: date-time
        otpVerifiedAt:
          type: string
          format: date-time
        failureReason:
          type: string
        dispatchedAt:
          type: string
          format: date-time
        deliveredAt:
          type: string
          format: date-time
    DeliveryOtpResponse:
      type: object
      properties:
        deliveryId:
          type: integer
          format: int64
        recipientEmail:
          type: string
        status:
          type: string
          example: ACTIVE
        expiresAt:
          type: string
          format: date-time
        attemptCount:
          type: integer
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          examples:
            - DRIVER_NOT_ASSIGNED_TO_TRIP
            - DELIVERY_ATTEMPT_NOT_FOUND
            - DELIVERY_ATTEMPT_NOT_CURRENT
            - DELIVERY_ALREADY_FINALIZED
            - POD_FILE_INVALID
            - MISSING_POD
            - DEALER_EMAIL_MISSING
            - OTP_NOT_REQUESTED
            - DELIVERY_OTP_INVALID
            - DELIVERY_OTP_EXPIRED
            - OTP_STILL_ACTIVE
            - OTP_MAX_ATTEMPTS_EXCEEDED
            - OTP_RESET_REQUIRED
            - PARTIAL_DELIVERY_NOT_ALLOWED
            - IN_TRANSIT_STOCK_NOT_FOUND
            - INVOICE_ALREADY_EXISTS
            - TRIP_NOT_READY_TO_COMPLETE
            - RETURN_FLOW_STATUS_INVALID
            - RETURN_COUNT_QC_INCOMPLETE
            - RETURN_QTY_MISMATCH
            - RETURN_APPROVAL_REQUIRED
            - RETURN_PUTAWAY_PLAN_REQUIRED
            - RETURN_PUTAWAY_MISMATCH
            - INVENTORY_VERSION_CONFLICT
        message:
          type: string
