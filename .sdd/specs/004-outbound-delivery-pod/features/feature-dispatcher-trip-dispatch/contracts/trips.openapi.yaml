openapi: 3.0.3
info:
  title: Dispatcher Trip Dispatch API
  version: 1.0.0
  description: Contracts for outbound trip list, create, update, cancel, depart, and complete in Sprint 1.
paths:
  /api/v1/trips:
    get:
      summary: List outbound trips for dispatch planning
      operationId: listTrips
      tags:
        - Trips
      security:
        - bearerAuth: []
      parameters:
        - name: warehouseId
          in: query
          required: false
          description: Optional warehouse filter. The authenticated user must be assigned to this warehouse.
          schema:
            type: integer
            format: int64
        - name: status
          in: query
          required: false
          description: Optional trip status filter.
          schema:
            type: string
            enum:
              - PLANNED
              - IN_TRANSIT
              - COMPLETED
              - CANCELLED
      responses:
        "200":
          description: Trips returned for the user's assigned warehouse scope
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TripResponse"
        "403":
          description: User is not assigned to the requested warehouse
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create a planned outbound trip
      operationId: createTrip
      tags:
        - Trips
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripCreateRequest"
      responses:
        "201":
          description: Trip created in PLANNED status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripResponse"
        "400":
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Dispatcher is not assigned to the trip warehouse
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Warehouse, vehicle, driver, or Delivery Order was not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Delivery Order, vehicle, or driver already belongs to another active trip
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Warehouse, status, stop order, or capacity validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/trips/{id}:
    put:
      summary: Update a planned outbound trip
      operationId: updateTrip
      tags:
        - Trips
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripUpdateRequest"
      responses:
        "200":
          description: Trip updated in PLANNED status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripResponse"
        "400":
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Dispatcher is not assigned to the trip warehouse
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Trip or referenced resources were not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Active-trip conflict for Delivery Order, vehicle, or driver
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Trip editability, stop order, or capacity validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/trips/{id}/cancel:
    put:
      summary: Cancel a planned outbound trip
      operationId: cancelTrip
      tags:
        - Trips
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripCancelRequest"
      responses:
        "200":
          description: Trip cancelled and Delivery Orders kept in WAREHOUSE_APPROVED
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripResponse"
        "400":
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Dispatcher is not assigned to the trip warehouse
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Trip not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Trip is no longer editable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/trips/{id}/depart:
    put:
      summary: Confirm trip departure and dispatch staged goods
      operationId: departTrip
      tags:
        - Trips
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripDepartRequest"
      responses:
        "200":
          description: Trip departed and Delivery Orders moved to IN_TRANSIT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripResponse"
        "400":
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authenticated driver is not assigned to the trip
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Trip or required staging inventory was not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Inventory optimistic-lock conflict during departure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Trip readiness or staged quantity validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/trips/{id}/complete:
    put:
      summary: Confirm vehicle return and complete the trip
      operationId: completeTrip
      tags:
        - Trips
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripCompleteRequest"
      responses:
        "200":
          description: Trip completed and vehicle/driver released
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripResponse"
        "400":
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Authenticated driver is not assigned to the trip
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Trip not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Trip is not ready to complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    TripCreateRequest:
      type: object
      required:
        - warehouseId
        - vehicleId
        - driverId
        - plannedDate
        - deliveryOrders
      properties:
        warehouseId:
          type: integer
          format: int64
        vehicleId:
          type: integer
          format: int64
        driverId:
          type: integer
          format: int64
        plannedDate:
          type: string
          format: date
        notes:
          type: string
          maxLength: 1000
        deliveryOrders:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/TripDeliveryOrderRequest"
    TripUpdateRequest:
      type: object
      properties:
        vehicleId:
          type: integer
          format: int64
        driverId:
          type: integer
          format: int64
        plannedDate:
          type: string
          format: date
        notes:
          type: string
          maxLength: 1000
        deliveryOrders:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/TripDeliveryOrderRequest"
    TripDeliveryOrderRequest:
      type: object
      required:
        - doId
        - stopOrder
      properties:
        doId:
          type: integer
          format: int64
        stopOrder:
          type: integer
          minimum: 1
    TripCancelRequest:
      type: object
      required:
        - reason
      properties:
        reason:
          type: string
          minLength: 1
          maxLength: 1000
    TripDepartRequest:
      type: object
      properties:
        confirmedAt:
          type: string
          format: date-time
        notes:
          type: string
          maxLength: 1000
    TripCompleteRequest:
      type: object
      properties:
        returnedAt:
          type: string
          format: date-time
        notes:
          type: string
          maxLength: 1000
    TripResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        tripNumber:
          type: string
        warehouseId:
          type: integer
          format: int64
        vehicleId:
          type: integer
          format: int64
        driverId:
          type: integer
          format: int64
        dispatcherId:
          type: integer
          format: int64
        plannedDate:
          type: string
          format: date
        tripType:
          type: string
          example: DELIVERY
        status:
          type: string
          example: PLANNED
        totalWeightKg:
          type: number
        totalVolumeM3:
          type: number
        departedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        notes:
          type: string
        deliveryOrders:
          type: array
          items:
            $ref: "#/components/schemas/TripDeliveryOrderResponse"
    TripDeliveryOrderResponse:
      type: object
      properties:
        doId:
          type: integer
          format: int64
        doNumber:
          type: string
        warehouseId:
          type: integer
          format: int64
        status:
          type: string
          example: WAREHOUSE_APPROVED
        stopOrder:
          type: integer
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          examples:
            - WAREHOUSE_SCOPE_FORBIDDEN
            - TRIP_DO_WAREHOUSE_MISMATCH
            - DO_ALREADY_ASSIGNED_TO_TRIP
            - VEHICLE_NOT_AVAILABLE
            - DRIVER_NOT_AVAILABLE
            - VEHICLE_OVERLOAD
            - TRIP_NOT_EDITABLE
            - TRIP_NOT_READY_TO_DEPART
            - TRIP_NOT_READY_TO_COMPLETE
            - INVENTORY_VERSION_CONFLICT
        message:
          type: string
