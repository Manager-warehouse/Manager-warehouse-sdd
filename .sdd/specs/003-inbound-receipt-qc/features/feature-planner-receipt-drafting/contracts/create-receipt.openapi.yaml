openapi: 3.0.3
info:
  title: Planner Receipt Drafting API
  version: 1.0.0
paths:
  /api/v1/receipts:
    post:
      summary: Create a supplier purchase receipt draft
      operationId: createPurchaseReceipt
      tags:
        - Receipts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReceiptRequest"
      responses:
        "201":
          description: Receipt created in PENDING_RECEIPT status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReceiptResponse"
        "400":
          description: Validation error or non-purchase receipt attempt
        "401":
          description: Missing or invalid authentication
        "403":
          description: Actor is not allowed to create receipts for the warehouse
        "404":
          description: Supplier, warehouse, or product not found
        "409":
          description: Duplicate source reference for supplier and warehouse
        "422":
          description: Inactive master data or invalid item semantics
components:
  schemas:
    CreateReceiptRequest:
      type: object
      required:
        - supplier_id
        - contact_person
        - warehouse_id
        - source_reference
        - source_channel
        - items
      properties:
        supplier_id:
          type: integer
          format: int64
        contact_person:
          type: string
          minLength: 1
          maxLength: 255
        warehouse_id:
          type: integer
          format: int64
        source_reference:
          type: string
          minLength: 1
          maxLength: 100
          description: Supplier PO number or equivalent manual source reference
        source_channel:
          $ref: "#/components/schemas/ReceiptSourceChannel"
        items:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/CreateReceiptItemRequest"
        notes:
          type: string
    CreateReceiptItemRequest:
      type: object
      required:
        - product_id
        - expected_qty
      properties:
        product_id:
          type: integer
          format: int64
        expected_qty:
          type: integer
          minimum: 1
    ReceiptSourceChannel:
      type: string
      enum:
        - ZALO
        - EMAIL
    ReceiptResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        receipt_number:
          type: string
        type:
          type: string
          enum:
            - PURCHASE
        status:
          type: string
          enum:
            - PENDING_RECEIPT
        supplier_id:
          type: integer
          format: int64
        warehouse_id:
          type: integer
          format: int64
        source_reference:
          type: string
        source_channel:
          $ref: "#/components/schemas/ReceiptSourceChannel"
        items:
          type: array
          items:
            $ref: "#/components/schemas/ReceiptItemResponse"
    ReceiptItemResponse:
      type: object
      properties:
        product_id:
          type: integer
          format: int64
        expected_qty:
          type: integer
