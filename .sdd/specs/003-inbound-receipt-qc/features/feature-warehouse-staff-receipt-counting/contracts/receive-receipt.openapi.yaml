openapi: 3.0.3
info:
  title: Warehouse Staff Receipt Counting API
  version: 1.0.0
paths:
  /api/v1/receipts/{id}/receive:
    put:
      summary: Submit or correct complete physical receipt counts
      operationId: receiveReceiptCounts
      tags:
        - Receipts
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReceiveReceiptRequest"
      responses:
        "200":
          description: Receipt counts accepted and receipt returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReceiptResponse"
        "400":
          description: Validation error format for malformed request
        "401":
          description: Missing or invalid authentication
        "403":
          description: Actor is not Warehouse Staff or cannot access receipt warehouse
        "404":
          description: Receipt or receipt item not found
        "409":
          description: Receipt status is already final or does not allow receive counting
        "422":
          description: Invalid count data or incomplete receipt item coverage
components:
  schemas:
    ReceiveReceiptRequest:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ReceiveReceiptItemRequest"
    ReceiveReceiptItemRequest:
      type: object
      required:
        - receipt_item_id
        - counted_qty
      properties:
        receipt_item_id:
          type: integer
          format: int64
        counted_qty:
          type: integer
          minimum: 1
    ReceiptResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        receipt_number:
          type: string
        status:
          type: string
          enum:
            - PENDING_RECEIPT
            - DRAFT
            - QC_COMPLETED
            - QC_FAILED
            - APPROVED
            - REJECTED
        warehouse_id:
          type: integer
          format: int64
        items:
          type: array
          items:
            $ref: "#/components/schemas/ReceiptItemResponse"
    ReceiptItemResponse:
      type: object
      properties:
        receipt_item_id:
          type: integer
          format: int64
        product_id:
          type: integer
          format: int64
        expected_qty:
          type: integer
        actual_qty:
          type: integer
          nullable: true
        over_received_qty:
          type: integer
